<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elliot's bookshelf — Archive</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" class="nav-brand" aria-label="Elliot's bookshelf home">Elliot's bookshelf</a>
    <ul class="nav-links" role="list">
      <li><a href="index.html">Reading</a></li>
      <li><a href="to-read.html">To Read</a></li>
      <li><a href="archive.html" aria-current="page">Archive</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-icon-btn" id="btn-search" aria-label="Search for a book"></button>
      <button class="nav-icon-btn" id="btn-settings" aria-label="Settings"></button>
    </div>
  </nav>

  <main class="page">
    <div class="container">

      <header class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">Archive</h1>
        </div>
      </header>

      <div class="tabs" id="tab-row" role="tablist" aria-label="Archive sub-lists"></div>

      <div id="panel-finished"  class="tab-panel" role="tabpanel" aria-live="polite"></div>
      <div id="panel-abandoned" class="tab-panel" role="tabpanel" aria-live="polite"></div>

    </div>
  </main>

  <div class="page-loading" id="page-loading" aria-hidden="true">
    <div class="spinner"></div>
  </div>

  <div id="modal-root" aria-live="assertive"></div>
  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="js/app.js"></script>
  <script>document.addEventListener('DOMContentLoaded', function () { Bookshelf.initArchive(); });</script>
</body>
</html>
